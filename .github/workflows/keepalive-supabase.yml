name: Keep Supabase awake

# Supabase Free tier pauses a project after ~7 days with no requests. This
# pings the REST API once a day so the project stays active (no pause).
#
# REQUIRED repo secrets (Settings → Secrets and variables → Actions → New
# repository secret):
#   SUPABASE_URL       e.g. https://xxxxxxxx.supabase.co   (no trailing slash)
#   SUPABASE_ANON_KEY  the project's anon public key
#
# Without the secrets the job fails fast with a clear message.
# Note: a project that's used daily (teachers/students logging in) never pauses
# anyway — this mainly matters for idle dev/test projects or long school breaks.

on:
  schedule:
    - cron: "30 5 * * *" # daily 05:30 UTC (~12:30 ICT)
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL / SUPABASE_ANON_KEY repo secrets — add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          # grade_levels is USING TRUE (readable by anyone) and always seeded,
          # so this is a guaranteed lightweight DB hit = real activity.
          curl -fsS \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/grade_levels?select=code&limit=1" \
            -o /dev/null -w "Supabase responded HTTP %{http_code}\n"
